<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MSNetwork - WiFi Network Monitoring Dashboard with GenieACS Integration" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>MSNetwork - WiFi Monitoring Dashboard</title>
  </head>
  <body>
    <!-- Emergency Debug UI removed as requested -->

    <div id="root"></div>

    <!-- Final Error Catcher -->
    <script>
      window.onerror = function(msg, url, line) {
        const div = document.createElement('div');
        div.style = 'position:fixed; top:0; left:0; width:100%; background:red; color:white; padding:20px; z-index:10000; font-family:monospace;';
        div.innerHTML = '<h3>FATAL JS ERROR</h3><p>' + msg + '</p><p>URL: ' + url + '</p><p>LINE: ' + line + '</p>';
        document.body.appendChild(div);
      };
    </script>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
