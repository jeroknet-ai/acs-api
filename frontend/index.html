<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MSNetwork - WiFi Network Monitoring Dashboard with GenieACS Integration" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>MSNetwork - WiFi Monitoring Dashboard</title>
  </head>
  <body>
    <!-- Emergency Debug UI (Visible if React fails) -->
    <div id="emergency-debug" style="position:fixed; bottom:10px; right:10px; z-index:9999; background:rgba(0,0,0,0.8); color:white; padding:10px; border-radius:5px; font-family:monospace; font-size:12px; border:1px solid #444;">
      <div id="boot-status" style="font-weight:bold; color:#0f0; margin-bottom:5px;">BOOTING...</div>
      <button onclick="location.href='/api/debug/genieacs'" style="background:#444; color:white; border:none; padding:4px 8px; cursor:pointer; margin-right:5px;">RAW DATA</button>
      <button onclick="location.href='/api/health'" style="background:#444; color:white; border:none; padding:4px 8px; cursor:pointer;">HEALTH</button>
    </div>

    <div id="root"></div>

    <!-- Final Error Catcher -->
    <script>
      window.onerror = function(msg, url, line) {
        const div = document.createElement('div');
        div.style = 'position:fixed; top:0; left:0; width:100%; background:red; color:white; padding:20px; z-index:10000; font-family:monospace;';
        div.innerHTML = '<h3>FATAL JS ERROR</h3><p>' + msg + '</p><p>URL: ' + url + '</p><p>LINE: ' + line + '</p>';
        document.body.appendChild(div);
      };
    </script>

    <script type="module" src="./src/main.jsx"></script>
  </body>
</html>
