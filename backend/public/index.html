<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MSNetwork - WiFi Network Monitoring Dashboard with GenieACS Integration" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>MSNetwork - WiFi Monitoring Dashboard</title>
    <script type="module" crossorigin src="./assets/index-C5daslXv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BiCJat1N.css">
  </head>
  <body>
    <!-- Emergency Error Catcher -->
    <div id="error-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: #900; color: white; padding: 20px; z-index: 9999; font-family: monospace;">
      <h2>🚨 JNetwork Error Detected</h2>
      <pre id="error-details" style="white-space: pre-wrap; word-break: break-all;"></pre>
    </div>
    <script>
      window.onerror = function(msg, url, line) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-details').innerText = 'ERROR: ' + msg + '\nURL: ' + url + '\nLINE: ' + line;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-details').innerText = 'PROMISE REJECTION: ' + event.reason;
      };
    </script>
    <div id="root"></div>
  </body>
</html>
