<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="MSNetwork - WiFi Network Monitoring Dashboard with GenieACS Integration" />
    <meta name="theme-color" content="#0a0e1a" />
    <title>MSNetwork - WiFi Monitoring Dashboard</title>
    <script type="module" crossorigin src="./assets/index-C5daslXv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-BiCJat1N.css">
  </head>
  <body>
    <!-- Emergency Diagnostic Overlay -->
    <div id="diag-overlay" style="position:fixed; bottom:10px; right:10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 5px 10px; z-index: 10000; font-family: monospace; font-size: 10px; border-radius: 4px;">
      STATUS: <span id="boot-status">BOOTING...</span>
    </div>

    <!-- Emergency Error Catcher -->
    <div id="error-screen" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: #900; color: white; padding: 20px; z-index: 9999; font-family: monospace;">
      <h2>🚨 JNetwork Error Detected</h2>
      <pre id="error-details" style="white-space: pre-wrap; word-break: break-all;"></pre>
      <button onclick="location.reload()" style="background: white; color: black; border: none; padding: 10px 20px; cursor: pointer;">RELOAD PAGE</button>
    </div>
    <script>
      window.onerror = function(msg, url, line) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-details').innerText = 'ERROR: ' + msg + '\nURL: ' + url + '\nLINE: ' + line;
        document.getElementById('boot-status').innerText = 'CRASHED';
        document.getElementById('boot-status').style.color = 'red';
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('error-screen').style.display = 'block';
        document.getElementById('error-details').innerText = 'PROMISE REJECTION: ' + event.reason;
      };
    </script>
    <div id="root"></div>
  </body>
</html>
